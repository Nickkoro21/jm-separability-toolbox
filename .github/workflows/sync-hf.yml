name: Sync to Hugging Face Space

# Auto-deploys this repo to the companion HF Space whenever main is updated.
# Triggers on push to main and via manual workflow_dispatch.
#
# Required GitHub Secrets:
#   HF_TOKEN  -  Hugging Face write access token
#                (Settings -> Access Tokens -> "Write" role)
#
# HF Space slug: NickKoro21/jm-separability-toolbox
# Decision #11 (HANDOFF) - Option Gamma.2 (GitHub Actions auto-deploy).
#
# Note: data/media/ contains 14 large-ish PNG figures used only for
# GitHub documentation / Pages. The HF Hub rejects binary files unless
# they go through Xet storage, and the Gradio app does not need them at
# runtime, so we strip them out before pushing to HF.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history for force-push)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: false

      - name: Build clean orphan branch for HF (squash + strip data/media)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create an orphan branch from main's tree with NO history.
          # The HF Hub validates the full git history for binary files,
          # so a single fresh commit without media is required.
          git checkout --orphan hf-deploy-tmp
          # Drop data/media from index AND from working tree.
          git rm -rf --cached data/media 2>/dev/null || true
          rm -rf data/media
          git add -A
          git commit -m "Deploy to HF Space (squashed from main)"

      - name: Force-push orphan branch as main to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            https://NickKoro21:$HF_TOKEN@huggingface.co/spaces/NickKoro21/jm-separability-toolbox \
            hf-deploy-tmp:main
